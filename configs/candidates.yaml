experiment_name: GemSpot-WillVisit

dataset:
  target_column: will_visit

  # ──────────────────────────────────────────────────────────────────────
  # CANONICAL SCHEMA — the single source of truth.
  # Every CSV used for training / retraining MUST have EXACTLY these 10
  # columns. No more, no less. data.py enforces this:
  #   - Missing columns → hard error
  #   - Extra columns   → silently dropped with a warning
  # This prevents schema drift between old CSV (`category`), new CSV
  # (`price`), and any future files.
  # ──────────────────────────────────────────────────────────────────────
  canonical_columns:
    - user_id
    - gmap_id
    - time
    - category_encoded
    - avg_rating
    - location_popularity
    - destination_vibe_tag
    - user_total_visits
    - user_personal_preferences
    - will_visit

  # Columns removed from feature matrix before training.
  # All IDs must be here — they are identifiers, not predictors.
  drop_columns:
    - user_id
    - gmap_id

  # Plain numeric columns kept as-is
  scalar_numeric_features:
    - avg_rating
    - location_popularity
    - user_total_visits
    - time

  # List-encoded string columns -> exploded into N individual numeric columns
  list_encoded_features:
    category_encoded:
      length: 21          # 21 category types (0=Restaurant ... 20=Other)
      prefix: cat_enc
    destination_vibe_tag:
      length: 20          # 20 binary vibe dimensions
      prefix: vibe
    user_personal_preferences:
      length: 20          # 20 float preference scores per vibe dim
      prefix: user_pref

  # Element-wise interaction features (pref[i] * vibe[i])
  interaction_features:
    - a: user_pref
      b: vibe
      prefix: pref_x_vibe

tracking:
  registered_model_name: GemSpotWillVisit
  run_name_prefix: gemspot-will-visit

candidates:
  # ---- BASELINE (naive lower-bound, required by rubric) ----
  - name: baseline
    kind: dummy
    notes: Naive lower-bound. Always predicts majority class (will_visit=1). Every real model must beat this.
    params:
      strategy: most_frequent


  # ---- HIST GRADIENT BOOSTING (sklearn native boosting) ----
  - name: hist_gradient_boosting
    kind: hist_gradient_boosting
    notes: Sklearn native histogram-based gradient boosting. Similar to XGBoost but built into sklearn. Compares framework-level differences for the same boosting approach.
    params:
      learning_rate: 0.1
      max_iter: 100
      max_depth: 6
      min_samples_leaf: 20
      random_state: 42

  # ---- XGBOOST V1 (default params, no tuning) ----
  - name: xgboost_v1
    kind: xgboost
    notes: XGBoost with default params. No imbalance handling. Starting point before tuning.
    params:
      learning_rate: 0.3
      max_depth: 6
      n_estimators: 100
      scale_pos_weight: 1.0
      random_state: 42
      n_jobs: -1

  # ---- XGBOOST V2 (tuned: lower LR + regularization) ----
  - name: xgboost_v2
    kind: xgboost
    notes: Tuned XGBoost. Lower learning rate + regularization (subsample, colsample) reduces overfitting and improves generalization over V1.
    params:
      learning_rate: 0.1
      max_depth: 6
      n_estimators: 100
      subsample: 0.85
      colsample_bytree: 0.8
      min_child_weight: 2
      reg_lambda: 1.5
      random_state: 42
      n_jobs: -1
      
