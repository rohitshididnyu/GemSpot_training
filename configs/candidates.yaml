experiment_name: GemSpot-WillVisit

dataset:
  target_column: will_visit
  numeric_features:
    - total_visits_30d
    - saved_places_30d
    - scenic_pref
    - relaxing_pref
    - foodie_pref
    - nightlife_pref
    - num_reviews
    - place_popularity
    - avg_rating
    - distance_km
    - month
  categorical_features:
    - category
    - region
    - vibe_tag
    - day_of_week
  text_features:
    - services
    - review_text

tracking:
  registered_model_name: GemSpotWillVisit
  run_name_prefix: gemspot-will-visit

candidates:
  - name: dummy_most_frequent
    kind: dummy
    notes: Simple lower-bound baseline.
    params:
      strategy: most_frequent

  - name: logistic_regression_baseline
    kind: logistic_regression
    notes: Strong simple baseline for tabular plus text features.
    params:
      C: 1.0
      class_weight: balanced
      max_iter: 500
      solver: liblinear

  - name: random_forest_v1
    kind: random_forest
    notes: Non-linear model that can capture feature interactions.
    params:
      n_estimators: 300
      max_depth: 16
      min_samples_leaf: 2
      random_state: 42
      n_jobs: -1

  - name: hist_gradient_boosting_v1
    kind: hist_gradient_boosting
    notes: Faster boosting-style candidate for better quality-cost tradeoffs.
    params:
      learning_rate: 0.08
      max_depth: 8
      max_iter: 250
      random_state: 42

  - name: xgboost_v1
    kind: xgboost
    notes: Advanced boosting candidate using XGBoost.
    params:
      learning_rate: 0.1
      max_depth: 8
      n_estimators: 200
      random_state: 42
      n_jobs: -1
