experiment_name: GemSpot-WillVisit

dataset:
  target_column: will_visit

  # ──────────────────────────────────────────────────────────────────────
  # CANONICAL SCHEMA — the single source of truth.
  # Every input (CSV or parquet) must boil down to EXACTLY these 9 columns
  # after the `column_rename` map is applied.
  #   - Missing columns → hard error
  #   - Extra columns   → silently dropped with a warning
  # (Note: `time` was removed because the parquet feed from the
  # `batch_pipeline` does not produce it. It's not strongly predictive
  # and caused schema mismatches across sources.)
  # ──────────────────────────────────────────────────────────────────────
  canonical_columns:
    - user_id
    - gmap_id
    - category_encoded
    - avg_rating
    - location_popularity
    - destination_vibe_tag
    - user_total_visits
    - user_personal_preferences
    - will_visit

  # Column rename map applied BEFORE canonical enforcement.
  # This bridges the MinIO/Iceberg parquet schema (location_*) to the
  # historical CSV schema used by our trained models.
  column_rename:
    location_id: gmap_id
    location_avg_rating: avg_rating
    location_vibe_tags: destination_vibe_tag
    location_category_encoded: category_encoded

  # Meta columns present in parquet feeds but NOT features.
  # They are dropped silently by the schema enforcer (non-canonical extras).
  # Listed here only for documentation.
  # - split              (used by parquet_loader for train/eval partition)
  # - pipeline_run_date
  # - snapshot_id

  # Column that holds the pre-computed train/eval flag in parquet inputs.
  # When present, the loader uses it INSTEAD of --cutoff / --train-pct.
  split_column: split
  split_train_value: train
  split_eval_value:  eval

  # Columns removed from feature matrix before training.
  # All IDs must be here — they are identifiers, not predictors.
  drop_columns:
    - user_id
    - gmap_id

  # Plain numeric columns kept as-is
  scalar_numeric_features:
    - avg_rating
    - location_popularity
    - user_total_visits

  # List-encoded string columns -> exploded into N individual numeric columns
  list_encoded_features:
    category_encoded:
      length: 21          # 21 category types (0=Restaurant ... 20=Other)
      prefix: cat_enc
    destination_vibe_tag:
      length: 20          # 20 binary vibe dimensions
      prefix: vibe
    user_personal_preferences:
      length: 20          # 20 float preference scores per vibe dim
      prefix: user_pref

  # Element-wise interaction features (pref[i] * vibe[i])
  interaction_features:
    - a: user_pref
      b: vibe
      prefix: pref_x_vibe

tracking:
  registered_model_name: GemSpotWillVisit
  run_name_prefix: gemspot-will-visit

# ────────────────────────────────────────────────────────────────────────
# QUALITY GATES — enforced by src/train.py before a model is registered.
#
# A candidate is only saved to artifacts/models/<name>.joblib AND logged
# via mlflow.sklearn.log_model(...) if ALL gates pass. Failed candidates
# are saved to artifacts/models/_rejected/<name>.joblib with a JSON
# sidecar describing why they failed, and are NOT registered.
#
# Rationale:
#   primary metric: roc_auc
#     - threshold-independent → honest measure under class imbalance
#       (we have observed 83% positive train vs 48% positive eval).
#     - the downstream recommendation ranker needs good RANKING, not
#       just good threshold-0.5 classification.
#   hard_minimums:
#     - roc_auc >= 0.55  → reject near-random rankers (0.50 = coin flip).
#     - recall  >= 0.30  → reject models that are too timid to be useful
#       for a recall-first recommender ("find me places I'd visit").
#   beat_baseline:
#     - a candidate that cannot beat DummyClassifier has no business
#       being served. min_delta=0.02 forces a non-trivial improvement
#       (2 ROC-AUC points) so we don't register "marginally better"
#       models.
#   exempt:
#     - [baseline] — the dummy candidate IS the reference and must
#       always be trained+tracked so later candidates can compare
#       against it. It is never promoted to production.
# ────────────────────────────────────────────────────────────────────────
quality_gates:
  hard_minimums:
    roc_auc: 0.55
    recall: 0.30
  beat_baseline:
    metric: roc_auc
    min_delta: 0.02
  exempt:
    - baseline

candidates:
  # ---- BASELINE (naive lower-bound, required by rubric) ----
  - name: baseline
    kind: dummy
    notes: Naive lower-bound. Always predicts majority class (will_visit=1). Every real model must beat this.
    params:
      strategy: most_frequent


  # ---- HIST GRADIENT BOOSTING (sklearn native boosting) ----
  - name: hist_gradient_boosting
    kind: hist_gradient_boosting
    notes: Sklearn native histogram-based gradient boosting. Similar to XGBoost but built into sklearn. Compares framework-level differences for the same boosting approach.
    params:
      learning_rate: 0.1
      max_iter: 100
      max_depth: 6
      min_samples_leaf: 20
      random_state: 42

  # ---- XGBOOST V1 (default params, no tuning) ----
  - name: xgboost_v1
    kind: xgboost
    notes: XGBoost with default params. No imbalance handling. Starting point before tuning.
    params:
      learning_rate: 0.3
      max_depth: 6
      n_estimators: 100
      scale_pos_weight: 1.0
      random_state: 42
      n_jobs: -1

  # ---- XGBOOST V2 (tuned: lower LR + regularization + class rebalance) ----
  - name: xgboost_v2
    kind: xgboost
    notes: Tuned XGBoost. Lower learning rate + regularization (subsample, colsample) reduces overfitting and improves generalization over V1. Adds scale_pos_weight=0.2 (≈ n_neg/n_pos on the parquet train split, 7689/38051) to counter the 83% positive class bias and stop the model from always predicting will_visit=1.
    params:
      learning_rate: 0.1
      max_depth: 6
      n_estimators: 100
      subsample: 0.85
      colsample_bytree: 0.8
      min_child_weight: 2
      reg_lambda: 1.5
      random_state: 42
      n_jobs: -1
      #scale_pos_weight: 0.2 
      
