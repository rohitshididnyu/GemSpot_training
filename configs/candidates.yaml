experiment_name: GemSpot-WillVisit

dataset:
  target_column: will_visit

  # Columns to drop before training (IDs and redundant raw text)
  drop_columns:
    - user_id
    - gmap_id
    - category   # redundant: already encoded in category_encoded

  # Plain numeric columns kept as-is
  scalar_numeric_features:
    - avg_rating
    - location_popularity
    - user_total_visits
    - time

  # List-encoded string columns -> exploded into N individual numeric columns
  list_encoded_features:
    category_encoded:
      length: 21          # 21 category types (0=Restaurant ... 20=Other)
      prefix: cat_enc
    destination_vibe_tag:
      length: 20          # 20 binary vibe dimensions
      prefix: vibe
    user_personal_preferences:
      length: 20          # 20 float preference scores per vibe dim
      prefix: user_pref

  # Element-wise interaction features (pref[i] * vibe[i])
  interaction_features:
    - a: user_pref
      b: vibe
      prefix: pref_x_vibe

tracking:
  registered_model_name: GemSpotWillVisit
  run_name_prefix: gemspot-will-visit

candidates:
  # ---- SIMPLE BASELINE (required by rubric) ----
  - name: dummy_most_frequent
    kind: dummy
    notes: Naive lower-bound baseline. Always predicts majority class (will_visit=1).
    params:
      strategy: most_frequent

  # ---- XGBOOST BASELINE (default params) ----
  - name: xgboost_baseline
    kind: xgboost
    notes: XGBoost with default/conservative params. Starting point before tuning.
    params:
      learning_rate: 0.3
      max_depth: 6
      n_estimators: 100
      scale_pos_weight: 1.0
      random_state: 42
      n_jobs: -1

  # ---- XGBOOST V1 (tuned for imbalanced data) ----
  - name: xgboost_v1
    kind: xgboost
    notes: Tuned XGBoost. Lower learning rate, deeper trees, scale_pos_weight for class imbalance.
    params:
      learning_rate: 0.1
      max_depth: 8
      n_estimators: 200
      scale_pos_weight: 4.7
      subsample: 0.9
      colsample_bytree: 0.8
      random_state: 42
      n_jobs: -1
