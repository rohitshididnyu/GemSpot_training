# Ray Bonus Config for GemSpot
# Uses the same real-data schema as candidates.yaml

dataset:
  target_column: will_visit

  drop_columns:
    - user_id
    - gmap_id
    - category

  scalar_numeric_features:
    - avg_rating
    - location_popularity
    - user_total_visits
    - time

  list_encoded_features:
    category_encoded:
      length: 21
      prefix: cat_enc
    destination_vibe_tag:
      length: 20
      prefix: vibe
    user_personal_preferences:
      length: 20
      prefix: user_pref

  interaction_features:
    - a: user_pref
      b: vibe
      prefix: pref_x_vibe

# XGBoost native API parameters (used by Ray Tune trials)
base_params:
  objective: "binary:logistic"
  eval_metric:
    - logloss
    - auc
    - aucpr
  tree_method: hist
  learning_rate: 0.08
  max_depth: 8
  min_child_weight: 2
  subsample: 0.9
  colsample_bytree: 0.8
  scale_pos_weight: 4.7
  reg_lambda: 1.0
  reg_alpha: 0.0
  num_boost_round: 200

# Ray Train (distributed training with checkpoints)
ray_train:
  num_workers: 2
  cpu_per_worker: 4
  gpu_per_worker: 0.0
  use_gpu: false
  checkpoint_frequency: 25
  max_failures: 2
  storage_path: "s3://ray/checkpoints"

# Ray Tune (hyperparameter search with ASHA)
ray_tune:
  num_samples: 12
  max_concurrent_trials: 4
  metric: roc_auc
  mode: max
  cpu_per_trial: 4
  gpu_per_trial: 0.0
  report_every: 25
  grace_period: 25
  reduction_factor: 2

ray_tune_experiment_name: GemSpot-WillVisit-RayTune
ray_experiment_name: GemSpot-WillVisit-RayTrain

# Hyperparameter search space for Ray Tune
search_space:
  max_depth:
    type: choice
    values: [4, 6, 8, 10]
  min_child_weight:
    type: choice
    values: [1, 2, 4]
  subsample:
    type: uniform
    lower: 0.6
    upper: 1.0
  colsample_bytree:
    type: uniform
    lower: 0.6
    upper: 1.0
  learning_rate:
    type: loguniform
    lower: 0.01
    upper: 0.2
  scale_pos_weight:
    type: choice
    values: [1.0, 2.0, 4.7, 6.0]
  reg_lambda:
    type: loguniform
    lower: 0.001
    upper: 10.0
  reg_alpha:
    type: loguniform
    lower: 0.0001
    upper: 1.0
